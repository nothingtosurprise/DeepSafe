name: DeepSafe CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.9
      uses: actions/setup-python@v5
      with:
        python-version: "3.9"

    - name: Install linting tools
      run: pip install black flake8

    - name: Check formatting with Black
      run: black --check --exclude '/(\.git|node_modules|venv|\.venv|build|dist)/' .

    - name: Lint with Flake8
      run: |
        # Fail on syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=venv,node_modules,.git,build,dist
        # Warn on style issues (non-blocking)
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics --exclude=venv,node_modules,.git,build,dist

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.9
      uses: actions/setup-python@v5
      with:
        python-version: "3.9"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest "httpx<0.28"
        pip install fastapi uvicorn pydantic aiohttp python-multipart pillow requests
        pip install joblib scikit-learn pandas rich sqlalchemy
        pip install "python-jose[cryptography]" "passlib[bcrypt]"
        pip install pyyaml opencv-python-headless numpy
        pip install -e sdk/

    - name: Run SDK tests
      run: pytest sdk/tests/ -v

    - name: Run unit tests
      env:
        DEEPSAFE_CONFIG_FILE_PATH: config/deepsafe_config.json
      run: pytest tests/test_api_unit.py -v

  docker:
    runs-on: ubuntu-latest
    needs: lint
    steps:
    - uses: actions/checkout@v4

    - name: Validate Docker Compose config
      run: docker compose config --quiet

    - name: Build API service
      run: docker compose build api

    - name: Build NPR model service
      run: docker compose build npr_deepfakedetection

    - name: Build frontend
      run: docker compose build frontend
